# ===================================================================
# CONFIGURACIÓN PARA ENTORNO DE TEST
# ===================================================================

# 1. Aplicación
spring.application.name=Trucks-Logistics-Test

# 2. Base de Datos en Memoria (H2)
# Esto permite que los tests corran sin tener PostgreSQL instalado
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 3. Reemplazo de Variables de Entorno (Placeholders)
# Definimos valores ficticios para que Spring no falle al buscar ${VARIABLE}
DB_URL=jdbc:h2:mem:testdb
DB_USERNAME=sa
DB_PASSWORD=
JWT_SECRET=test_secret_key_for_testing_purposes_only_1234567890
MAILTRAP_HOST=localhost
MAILTRAP_PORT=2525
MAILTRAP_USERNAME=test_user
MAILTRAP_PASSWORD=test_password

# 4. Configuración de JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# 5. Configuración de Mail (Simulado)
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# 6. Otros
app.base-url=http://localhost:8080